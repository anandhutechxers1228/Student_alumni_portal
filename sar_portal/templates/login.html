<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SAR Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1B4332;
            --primary-mid: #2D6A4F;
            --accent: #C9A84C;
            --bg: #F5F7F5;
            --white: #FFFFFF;
            --text: #1A2E1F;
            --muted: #6B7B6E;
            --danger: #B5302A;
            --border: #DDE5DD;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-wrap {
            display: flex;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 8px 48px rgba(27,67,50,0.12);
            overflow: hidden;
            width: 100%;
            max-width: 820px;
        }

        .login-left {
            width: 320px;
            background: linear-gradient(160deg, #0d2b1e 0%, #1B4332 50%, #2D6A4F 100%);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
            top: -60px;
            right: -60px;
        }

        .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            color: white;
            text-decoration: none;
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
        }

        .brand span {
            color: var(--accent);
        }

        .login-left-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: white;
            text-align: center;
            margin-bottom: 12px;
            position: relative;
            z-index: 2;
        }

        .login-left-title em {
            color: var(--accent);
            font-style: italic;
        }

        .login-left-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            line-height: 1.7;
            position: relative;
            z-index: 2;
        }

        .login-right {
            flex: 1;
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 30px;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .login-sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .login-sub a {
            color: var(--primary-mid);
            font-weight: 600;
            text-decoration: none;
        }

        .login-sub a:hover {
            text-decoration: underline;
        }

        .error-box {
            background: #fdf0ee;
            border: 1px solid #f5c6c2;
            color: var(--danger);
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-mid);
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .btn-login:hover {
            background: var(--primary-mid);
            transform: translateY(-1px);
        }

        @media (max-width: 700px) {
            .login-left {
                display: none;
            }
            .login-right {
                padding: 40px 28px;
            }
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-left">
        <a href="/" class="brand">SAR <span>Portal</span></a>
        <h2 class="login-left-title">Welcome <em>Back</em></h2>
        <p class="login-left-desc">Log in to access your network, opportunities, and mentors.</p>
    </div>

    <div class="login-right">
        <h2>Sign In</h2>
        <div class="login-sub">New here? <a href="/signup/">Create an account</a></div>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>
    </div>
</div>

</body>
</html>
