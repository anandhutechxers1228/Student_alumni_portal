<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — SAR Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1B4332;
            --primary-mid: #2D6A4F;
            --primary-light: #40916C;
            --accent: #C9A84C;
            --accent-light: #F9F1D8;
            --bg: #F5F7F5;
            --white: #FFFFFF;
            --text: #1A2E1F;
            --muted: #6B7B6E;
            --danger: #B5302A;
            --success: #2D6A4F;
            --border: #DDE5DD;
            --nav-h: 68px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            background: var(--primary);
            height: var(--nav-h);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 16px rgba(27, 67, 50, 0.18);
        }

        .nav-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            color: var(--white);
            text-decoration: none;
            letter-spacing: 0.3px;
            white-space: nowrap;
            margin-right: 32px;
            flex-shrink: 0;
        }

        .nav-brand span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .nav-link {
            color: rgba(255,255,255,0.72);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            position: relative;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .nav-link.active {
            color: var(--accent);
        }

        .chat-badge {
            position: absolute;
            top: 2px;
            right: 4px;
            background: #e53e3e;
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            line-height: 1;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .nav-search-wrap {
            position: relative;
        }

        .nav-search-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .nav-search-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .nav-search-panel {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 10px);
            width: 320px;
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(27,67,50,0.18);
            border: 1px solid var(--border);
            z-index: 400;
            overflow: hidden;
        }

        .nav-search-panel.open {
            display: block;
        }

        .nav-search-input-wrap {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            gap: 8px;
        }

        .nav-search-input-wrap span {
            color: var(--muted);
            font-size: 16px;
        }

        .nav-search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        .nav-search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            transition: background 0.15s;
        }

        .search-result-item:hover {
            background: #f0f5f1;
        }

        .search-avatar-sm {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .search-avatar-sm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-result-info {
            flex: 1;
            min-width: 0;
        }

        .search-result-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .search-result-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
        }

        .search-hint {
            padding: 14px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .advanced-search-link {
            display: block;
            text-align: center;
            padding: 12px;
            background: #f5f7f5;
            color: var(--primary-mid);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border-top: 1px solid var(--border);
        }

        .advanced-search-link:hover {
            background: #eef4ef;
        }

        .nav-logout {
            padding: 7px 16px;
            background: rgba(181,48,42,0.15);
            color: #f5a09d;
            border: 1px solid rgba(181,48,42,0.3);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .nav-logout:hover {
            background: rgba(181,48,42,0.28);
        }

        .main-content {
            min-height: calc(100vh - var(--nav-h));
        }

        @media (max-width: 900px) {
            .navbar {
                padding: 0 20px;
            }
            .nav-link {
                padding: 7px 10px;
                font-size: 13px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                flex-wrap: wrap;
                height: auto;
                padding-top: 10px;
                padding-bottom: 10px;
                gap: 8px;
            }
            .nav-links {
                order: 3;
                width: 100%;
                flex-wrap: wrap;
            }
            .nav-brand {
                margin-right: 0;
                font-size: 18px;
            }
            .nav-search-panel {
                width: calc(100vw - 32px);
                right: -16px;
                max-width: 320px;
            }
        }

        @media (max-width: 480px) {
            .nav-search-panel {
                width: calc(100vw - 32px);
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/admin/dashboard/" class="nav-brand">SAR <span>Admin</span></a>
    <div class="nav-links">
        <a href="/admin/dashboard/" class="nav-link {% if request.path == '/admin/dashboard/' %}active{% endif %}">Dashboard</a>
        <a href="/admin/users/" class="nav-link {% if request.path == '/admin/users/' %}active{% endif %}">Users</a>
        <a href="/admin/jobs/" class="nav-link {% if request.path == '/admin/jobs/' %}active{% endif %}">Jobs</a>
        <a href="/admin/internships/" class="nav-link {% if request.path == '/admin/internships/' %}active{% endif %}">Internships</a>
        <a href="/admin/mentorship/" class="nav-link {% if '/admin/mentorship' in request.path %}active{% endif %}">Mentorship</a>
        <a href="/admin/broadcast/" class="nav-link {% if request.path == '/admin/broadcast/' %}active{% endif %}">Broadcasts</a>
        <a href="/admin/support/" class="nav-link {% if '/admin/support' in request.path %}active{% endif %}">Support<span class="chat-badge" id="adminSupportBadge"></span></a>
    </div>
    <div class="nav-right">
        <div class="nav-search-wrap" id="navSearchWrap">
            <button class="nav-search-btn" onclick="toggleSearch(event)" title="Find People">🔍</button>
            <div class="nav-search-panel" id="navSearchPanel">
                <div class="nav-search-input-wrap">
                    <span>🔍</span>
                    <input type="text" class="nav-search-input" id="navSearchInput" placeholder="Search people by name..." autocomplete="off">
                </div>
                <div class="nav-search-results" id="navSearchResults">
                    <div class="search-hint">Type at least 4 letters to search</div>
                </div>
                <a href="/admin/search/advanced/" class="advanced-search-link">Advanced Search →</a>
            </div>
        </div>
        <a href="/admin/logout/" class="nav-logout">Logout</a>
    </div>
</nav>

<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script>
    function toggleSearch(e) {
        e.stopPropagation();
        var panel = document.getElementById('navSearchPanel');
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) {
            document.getElementById('navSearchInput').focus();
        }
    }

    document.addEventListener('click', function(e) {
        var wrap = document.getElementById('navSearchWrap');
        if (wrap && !wrap.contains(e.target)) {
            document.getElementById('navSearchPanel').classList.remove('open');
        }
    });

    var searchTimer = null;
    var searchInput = document.getElementById('navSearchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            var q = this.value.trim();
            var results = document.getElementById('navSearchResults');
            clearTimeout(searchTimer);
            if (q.length < 4) {
                results.innerHTML = '<div class="search-hint">Type at least 4 letters to search</div>';
                return;
            }
            results.innerHTML = '<div class="search-hint">Searching...</div>';
            searchTimer = setTimeout(function() {
                fetch('/search/?q=' + encodeURIComponent(q))
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.users || data.users.length === 0) {
                            results.innerHTML = '<div class="search-hint">No users found</div>';
                            return;
                        }
                        results.innerHTML = data.users.map(function(u) {
                            var avatar = u.profile_pic
                                ? '<img src="/media/' + u.profile_pic + '" alt="">'
                                : '<span>' + u.name.charAt(0).toUpperCase() + '</span>';
                            return '<a href="/admin/users/' + u.id + '/" class="search-result-item">' +
                                '<div class="search-avatar-sm">' + avatar + '</div>' +
                                '<div class="search-result-info">' +
                                '<div class="search-result-name">' + u.name + '</div>' +
                                '<div class="search-result-sub">' + (u.stream || '') + ' &middot; ' + (u.status || '') + '</div>' +
                                '</div></a>';
                        }).join('');
                    })
                    .catch(function() {
                        results.innerHTML = '<div class="search-hint">Search failed</div>';
                    });
            }, 300);
        });
    }

    function updateAdminSupportBadge() {
        fetch('/admin/api/unread_support/')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var badge = document.getElementById('adminSupportBadge');
                if (!badge) return;
                if (d.count > 0) {
                    badge.textContent = d.count > 99 ? '99+' : d.count;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            })
            .catch(function() {});
    }
    updateAdminSupportBadge();
    setInterval(updateAdminSupportBadge, 30000);
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
